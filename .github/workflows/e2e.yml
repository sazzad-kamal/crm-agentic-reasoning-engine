name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  e2e-api:
    name: API E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Run E2E API tests
        env:
          MOCK_LLM: "1"
          OPENAI_API_KEY: "test-key"
        run: |
          pytest tests/e2e/ -v --tb=short

  e2e-browser:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [e2e-api]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      
      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          MOCK_LLM: "1"
          OPENAI_API_KEY: "test-key"
        run: npx playwright test --project=chromium
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-e2e
          path: frontend/playwright-report
          retention-days: 7

  e2e-integration:
    name: Full Stack Integration
    runs-on: ubuntu-latest
    needs: [e2e-api]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      
      - name: Start backend server
        env:
          MOCK_LLM: "1"
          OPENAI_API_KEY: "test-key"
        run: |
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health || exit 1
      
      - name: Test API endpoint
        run: |
          curl -X POST http://localhost:8000/api/chat \
            -H "Content-Type: application/json" \
            -d '{"question": "What is Acme CRM?"}' \
            -f || exit 1

  all-tests-summary:
    name: All Tests Summary
    runs-on: ubuntu-latest
    needs: [e2e-api, e2e-browser, e2e-integration]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.e2e-api.result }}" == "failure" ] || \
             [ "${{ needs.e2e-browser.result }}" == "failure" ] || \
             [ "${{ needs.e2e-integration.result }}" == "failure" ]; then
            echo "Some E2E tests failed"
            exit 1
          fi
          echo "All E2E tests passed!"
