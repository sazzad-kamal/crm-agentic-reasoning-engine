# Expected SQL Results - EXACT assertions for 100% accuracy
# Based on actual CSV data - validates "nothing more, nothing less"
#
# Assertion types:
#   row_count: Exact number of rows
#   row_count_min/max: Range of rows
#   must_contain_all: All values must appear
#   must_not_contain: Values must NOT appear (critical for filtering)
#   total_value: Sum of value column (10% tolerance)
#   exact_values: Exact column values

# =============================================================================
# SALES REP BRANCH (jsmith)
# jsmith owns: Acme (2 open), Crown (1 open), Fusion (1 open + 1 closed won)
# Total open deals: 4 (Acme x2, Crown x1, Fusion-upsell x1)
# =============================================================================

"Show my open deals":
  row_count: 4
  must_contain_all: ["Acme", "Crown", "Fusion"]
  must_not_contain: ["Beta", "Delta", "Green", "Eastern", "Harbor"]
  total_value: 69000  # 15000 + 24000 + 18000 + 12000

"Show deals by stage":
  row_count: 4
  must_contain_all: ["Proposal", "Qualified"]
  must_not_contain: ["Closed Won", "Closed Lost", "Beta", "Delta"]

"Show my Acme deals":
  row_count: 2
  must_contain_all: ["Acme", "15000", "24000"]
  must_not_contain: ["Crown", "Fusion", "Beta", "Delta"]
  total_value: 39000  # 15000 + 24000

"Show deals by value":
  row_count: 4
  must_contain_all: ["24000", "18000", "15000", "12000"]
  must_not_contain: ["32000", "22000", "26000"]  # Other owners' deals

"Show deals in Proposal stage":
