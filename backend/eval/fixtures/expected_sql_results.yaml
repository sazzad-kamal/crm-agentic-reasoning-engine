# Expected SQL Results for flow eval - validates that SQL queries return correct data
#
# Assertion types:
# - row_count_min: Minimum number of rows expected
# - row_count_max: Maximum number of rows expected
# - total_value: Expected sum of value column (flexible column name matching)
# - must_contain: Values that must appear in any column of any row
# - must_contain_all: All these values must appear (AND logic)
# - must_contain_any: At least one of these values must appear (OR logic)
#
# Only SQL-only questions (expected_rag: false) need assertions here.
# 15 SQL questions: 5 sales rep, 2 CSM, 8 manager
#
# NOTE: Assertions focus on structural correctness, not owner-specific data,
# since owner filtering may vary. Total pipeline: $180k open, $55k lost

# =============================================================================
# SALES REP BRANCH (5 SQL questions)
# =============================================================================

"How's my pipeline by stage and health?":
  # Should return pipeline grouped by stage with health info
  row_count_min: 2
  must_contain_any:
    - "Proposal"
    - "Qualified"
    - "Discovery"
    - "Negotiation"

"Which deals need attention?":
  # Deals needing attention - high days_in_stage or at-risk
  row_count_min: 1
  must_contain_any:
    - "Acme"
    - "Crown"
    - "Fusion"
    - "Beta"
    - "Delta"
    - "days"
    - "risk"

"What's my forecast confidence by stage?":
  # Forecast with weighted values by stage
  row_count_min: 1
  must_contain_any:
    - "Qualified"
    - "Proposal"
    - "Discovery"
    - "Negotiation"
    - "forecast"
    - "weighted"

"How long has each deal been in current stage?":
  # Deal list with days_in_stage
  row_count_min: 1
  must_contain_any:
    - "days"
    - "stage"

"Which deals have the highest velocity?":
  # Deals ranked by velocity (value / time)
  row_count_min: 1

# =============================================================================
# CSM BRANCH (2 SQL questions)
# =============================================================================

"Which renewals are at risk and why?":
  # Renewals with risk indicators
  row_count_min: 1
  must_contain_any:
    - "Delta"
    - "Renewal"
    - "risk"
    - "at-risk"

"How does my Q1 pipeline compare to Q4?":
  # Quarter-over-quarter comparison
  row_count_min: 1

# =============================================================================
# MANAGER BRANCH (8 SQL questions)
# All reps, all opps
# =============================================================================

"How's the team performing with win rates?":
  # Win rates by owner
  row_count_min: 1
  must_contain_any:
    - "jsmith"
    - "ljones"
    - "amartin"
    - "mmalik"
    - "rate"
    - "won"

"Show me decision makers with open deals and overdue tasks":
  # Decision makers with open opps
  row_count_min: 1
  must_contain_any:
    - "Anna"
    - "Maria"
    - "Erin"
    - "Lisa"
    - "Emma"
    - "Decision Maker"

"Which high-value accounts have multiple risk signals?":
  # High-value accounts with risk
  row_count_min: 1
  must_contain_any:
    - "Beta"
    - "Delta"
    - "risk"
    - "at-risk"

"What's our forecast accuracy trend?":
  # Forecast accuracy data
  row_count_min: 1

"Which contacts have no recent activity?":
  # Contacts without recent activity
  row_count_min: 1

"Which rep has the best close rate?":
  # Close rates by rep
  row_count_min: 1
  must_contain_any:
    - "jsmith"
    - "ljones"
    - "rate"

"What deals did we lose and what patterns emerge?":
  # Lost deals: GREEN-RENEW ($20k), GREEN-EXPAND ($35k)
  row_count_min: 1
  total_value: 55000  # $20k + $35k
  must_contain_any:
    - "Green"
    - "Closed Lost"
    - "Lost"

"How does this quarter compare to last?":
  # Quarter-over-quarter comparison
  row_count_min: 1
