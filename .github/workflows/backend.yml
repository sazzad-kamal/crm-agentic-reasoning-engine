name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'tests/backend/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
      
      - name: Run Ruff linter
        run: ruff check backend/ --select=E,F,W --ignore=E501,F401,F841,E402,E701,E741

      - name: Run type check
        run: mypy backend/ --ignore-missing-imports --no-error-summary --allow-untyped-defs

  test-agent:
    name: Agent Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run agent tests
        env:
          MOCK_LLM: "1"
        run: |
          pytest tests/backend/agent/ -v --tb=short

  test-core:
    name: Core Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Run middleware and client tests
        env:
          MOCK_LLM: "1"
          OPENAI_API_KEY: "test-key"
        run: |
          pytest tests/backend/ -v --tb=short --ignore=tests/backend/agent/

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [test-agent, test-core]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Run all tests with coverage
        env:
          MOCK_LLM: "1"
          OPENAI_API_KEY: "test-key"
        run: |
          pytest tests/backend/ --cov=backend --cov-report=xml --cov-report=term-missing -v
        continue-on-error: true
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
