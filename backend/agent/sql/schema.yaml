# CRM Database Schema - Single source of truth
# Used by: connection.py (views), prompt.txt (LLM context)

tables:
  companies:
    columns:
      company_id: "VARCHAR PRIMARY KEY"
      name: "VARCHAR"
      domain: "VARCHAR"
      status: "VARCHAR CHECK (status IN ('Active', 'Churned', 'Trial', 'Prospect'))"
      plan: "VARCHAR"
      account_owner: "VARCHAR"
      industry: "VARCHAR"
      segment: "VARCHAR CHECK (segment IN ('Enterprise', 'Mid-market', 'SMB'))"
      region: "VARCHAR"
      renewal_date: "DATE"
      created_at: "DATETIME"
      updated_at: "DATETIME"
      health_status: "VARCHAR"
      notes: "TEXT"

  contacts:
    columns:
      contact_id: "VARCHAR PRIMARY KEY"
      company_id: "VARCHAR NOT NULL REFERENCES companies(company_id)"
      first_name: "VARCHAR"
      last_name: "VARCHAR"
      email: "VARCHAR"
      phone: "VARCHAR"
      job_title: "VARCHAR"
      role: "VARCHAR CHECK (role IN ('Decision Maker', 'Champion', 'Technical Contact', 'Executive', 'User'))"
      lifecycle_stage: "VARCHAR CHECK (lifecycle_stage IN ('Lead', 'MQL', 'SQL', 'Customer'))"
      created_at: "DATETIME"
      updated_at: "DATETIME"
      notes: "TEXT"

  opportunities:
    columns:
      opportunity_id: "VARCHAR PRIMARY KEY"
      company_id: "VARCHAR NOT NULL REFERENCES companies(company_id)"
      contact_id: "VARCHAR REFERENCES contacts(contact_id)"
      name: "VARCHAR"
      stage: "VARCHAR CHECK (stage IN ('New', 'Discovery', 'Qualified', 'Proposal', 'Negotiation', 'Closed Won', 'Closed Lost'))"
      type: "VARCHAR CHECK (type IN ('New Business', 'Renewal', 'Expansion'))"
      amount: "DECIMAL"
      currency: "VARCHAR"
      probability: "INT"
      source: "VARCHAR"
      owner: "VARCHAR"
      expected_close_date: "DATE"
      created_at: "DATETIME"
      updated_at: "DATETIME"
      closed_date: "DATE"
      notes: "TEXT"

  activities:
    columns:
      activity_id: "VARCHAR PRIMARY KEY"
      company_id: "VARCHAR NOT NULL REFERENCES companies(company_id)"
      contact_id: "VARCHAR REFERENCES contacts(contact_id)"
      opportunity_id: "VARCHAR REFERENCES opportunities(opportunity_id)"
      type: "VARCHAR CHECK (type IN ('Call', 'Email', 'Meeting', 'Task'))"
      subject: "VARCHAR"
      notes: "TEXT"
      due_date: "DATETIME"
      owner: "VARCHAR"
      priority: "VARCHAR CHECK (priority IN ('High', 'Medium', 'Low'))"
      status: "VARCHAR CHECK (status IN ('Open', 'Completed', 'Cancelled'))"
      created_at: "DATETIME"
      completed_at: "DATETIME"

  history:
    columns:
      history_id: "VARCHAR PRIMARY KEY"
      company_id: "VARCHAR NOT NULL REFERENCES companies(company_id)"
      contact_id: "VARCHAR REFERENCES contacts(contact_id)"
      opportunity_id: "VARCHAR REFERENCES opportunities(opportunity_id)"
      type: "VARCHAR CHECK (type IN ('Call', 'Email', 'Meeting', 'Note'))"
      subject: "VARCHAR"
      notes: "TEXT"
      source: "VARCHAR"
      occurred_at: "DATETIME"
      owner: "VARCHAR"
      created_at: "DATETIME"
