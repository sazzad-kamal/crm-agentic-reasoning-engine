  must_contain_all: ["Proposal", "Acme", "Crown"]
  must_not_contain: ["Qualified", "Negotiation", "Discovery", "Beta", "Delta"]

"Show deals in Qualified stage":
  row_count: 2
  must_contain_all: ["Qualified", "Acme", "Fusion"]
  must_not_contain: ["Proposal", "Negotiation", "Discovery"]

"Show deals in Negotiation stage":
  row_count: 0
  # jsmith has no deals in Negotiation (that's ljones with Beta)

"Show Acme contacts":
  row_count: 3
  must_contain_all: ["Anna", "Beth", "Joe"]
  must_not_contain: ["Maria", "Lisa", "Erin", "Carlos"]

"Show Acme deal values":
  row_count: 2
  must_contain_all: ["15000", "24000"]
  must_not_contain: ["18000", "12000", "32000"]  # Other deals
  total_value: 39000

"Show Acme activities":
  row_count_min: 1
  must_contain: "Acme"
  must_not_contain: ["Crown", "Beta", "Delta"]

"Show deals over 20000":
  row_count: 1
  must_contain: "24000"
  must_not_contain: ["15000", "18000", "12000", "32000"]  # 32000 is ljones

"Show deals under 20000":
  row_count: 3
  must_contain_all: ["15000", "18000", "12000"]
  must_not_contain: ["24000", "32000", "22000"]

"Show total pipeline value":
  row_count_min: 1
  # Total of jsmith's open deals: 69000

