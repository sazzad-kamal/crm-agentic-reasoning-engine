# Expected SQL Results - assertions for query validation
# Based on actual CSV data - validates correctness of SQL results
#
# Assertion types:
#   row_count: Exact number of rows
#   row_count_min/max: Range of rows
#   column_values: Expected values must appear in column (extras OK)
#   column_excludes: Values must NOT appear in column
#   total_value: Sum of value column (10% tolerance)
#   exact_values: Exact column values (set equality)
#
# Legacy (text-based, less precise):
#   must_contain_all/any: Values in flattened text
#   must_not_contain: Values not in flattened text

# =============================================================================
# OPPORTUNITIES BRANCH - Starter: "What deals are in the pipeline?"
# =============================================================================

"What deals are in the pipeline?":
  row_count_min: 8
  column_excludes:
    stage: ["Closed Won", "Closed Lost"]

"How are deals distributed by stage?":
  row_count_min: 4
  column_values:
    stage: ["Proposal", "Qualified", "Negotiation", "Discovery"]

"What are the highest value deals?":
  row_count_min: 4
  column_values:
    value: [32000, 26000, 24000, 22000]

"Which deals involve Acme Manufacturing?":
  row_count: 2
  column_values:
    value: [15000, 24000]
  total_value: 39000

"What deals are in Proposal stage?":
  row_count_min: 2
  column_values:
    stage: ["Proposal"]
  column_excludes:
    stage: ["Qualified", "Negotiation", "Discovery", "Closed Won", "Closed Lost"]

"What deals are in Qualified stage?":
  row_count_min: 3
  column_values:
    stage: ["Qualified"]
  column_excludes:
    stage: ["Proposal", "Negotiation", "Closed Won", "Closed Lost"]

"What deals are in Negotiation stage?":
  row_count: 1
  column_values:
    stage: ["Negotiation"]
    value: [32000]

"Which deals are over $50,000?":
  row_count: 0

"Which deals are under $20,000?":
  row_count_min: 4
  column_values:
    value: [15000, 18000, 12000]
  column_excludes:
    value: [32000, 26000, 24000, 22000]

"What's the total pipeline value?":
  row_count_min: 1

"Who are the Acme Manufacturing contacts?":
  row_count: 3
  column_values:
    first_name: ["Anna", "Beth", "Joe"]
  column_excludes:
    first_name: ["Maria", "Erin", "Carlos"]

"What activities happened with Acme Manufacturing?":
  row_count_min: 1

