# Expected intents for flow eval - used for intent classification accuracy
#
# Valid intents (11 total) - 1:1 mapping to handlers:
#
# COMPANY-SPECIFIC (requires company name, triggers RAG):
# - company: All company queries (status, pipeline, history, deep context)
#
# AGGREGATE/GLOBAL (no specific company):
# - renewals: Contract renewals across ALL accounts
# - pipeline_summary: Total pipeline value, deal counts across ALL accounts
# - deals_at_risk: At-risk deals AND accounts needing attention
# - forecast: Pipeline forecast, projections, weighted pipeline
# - forecast_accuracy: Win rate metrics
# - activities: Activity search (calls, emails, meetings)
# - contacts: Contact queries (lookup by company or search by name)
# - company_search: Search companies by segment/industry
# - attachments: Document/file searches
# - analytics: Counts, breakdowns, distributions, aggregations

